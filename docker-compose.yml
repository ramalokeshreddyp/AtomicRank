

services:
  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - leaderboard_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - API_PORT=${API_PORT:-3000}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - leaderboard_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-3000}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  leaderboard_net:
    driver: bridge
